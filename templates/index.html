<!DOCTYPE html>
<html>
<head>
    <title>Marks Predictor</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            margin-top: 80px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        input, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }

        .hidden {
            display: none;
        }

        img {
            width: 120px;
            margin-top: 10px;
        }
    </style>

    <script>
        function clearResult() {
            document.getElementById("resultBox").classList.add("hidden");
        }
    </script>

</head>

<body>

<div class="box">

    <h2>📊 Marks Predictor</h2>

    <form action="/predict" method="post">
        <input type="number" name="hours" placeholder="Enter study hours"
               onclick="clearResult()" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    <!-- Result Section -->
    {% if prediction_text %}
    <div id="resultBox" class="result">

        <p>✅ You entered: <b>{{ hours }}</b> hours</p>

        <p>🎉 Successfully Predicted!</p>

        <p>{{ prediction_text }}</p>

        <!-- Dancing GIF -->
        <img src="https://media.giphy.com/media/111ebonMs90YLu/giphy.gif">

    </div>
    {% endif %}

</div>

</body>
</html>
