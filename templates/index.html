<!DOCTYPE html>
<html>
<head>
    <title>Marks Predictor</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
            margin-top: 100px;
        }

        .box {
            background: white;
            color: black;
            padding: 30px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>🎓 Marks Predictor</h2>

        <form action="/predict" method="post">
            <input type="number" name="hours" placeholder="Enter study hours" required>
            <br>
            <button type="submit">Predict</button>
        </form>

        <h3>{{ prediction_text }}</h3>
    </div>

</body>
</html>
